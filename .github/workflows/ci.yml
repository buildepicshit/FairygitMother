name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild better-sqlite3
        run: pnpm rebuild better-sqlite3

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name fairygitmother \
            --resource-group fairygitmother-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:${{ github.sha }} \
            --set-env-vars \
              FAIRYGITMOTHER_DB_PATH=/data/fairygitmother.db \
              FAIRYGITMOTHER_HOST=0.0.0.0 \
              FAIRYGITMOTHER_PORT=3000

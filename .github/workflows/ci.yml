name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fgmtest
          POSTGRES_PASSWORD: fgmtest
          POSTGRES_DB: fairygitmother_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fgmtest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://fgmtest:fgmtest@localhost:5432/fairygitmother_test
        run: npx tsx packages/server/src/db/migrate-cli.ts

      - name: Lint
        run: pnpm lint

      - name: Test
        env:
          DATABASE_URL: postgresql://fgmtest:fgmtest@localhost:5432/fairygitmother_test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name fairygitmother \
            --resource-group fairygitmother-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/fairygitmother:${{ github.sha }} \
            --set-env-vars \
              DATABASE_URL=${{ secrets.DATABASE_URL }} \
              FAIRYGITMOTHER_DATA_DIR=/data \
              FAIRYGITMOTHER_HOST=0.0.0.0 \
              FAIRYGITMOTHER_PORT=3000
